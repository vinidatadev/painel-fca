server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "DENY";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # CSP liberado para dev local
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://learn.microsoft.com http://localhost:9000; media-src 'self'; connect-src 'self' http://localhost:8000 ws://localhost:8000 https://login.microsoftonline.com;";

    location / {
        try_files $uri $uri/ /index.html;
    }
}
